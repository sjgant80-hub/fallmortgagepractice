<script>
'use strict';
// ════════════════════════════════════════════════════════════════
// FallMortgagePractice v1.0.0 · sovereign UK mortgage broker firm accounting · MIT
// ◊·κ=1 · prime 881 · firm-side: procuration · clawback · pipeline · PI · network levy
// TOOL · NOT REGULATED ADVICE · FCA submissions remain firm's responsibility
// ════════════════════════════════════════════════════════════════
const TOOLNAME='fallmortgagepractice';
const VERSION='1.0.0';
const PRIME=881;
const STORE='fallmortgagepractice-v1';
const TAX_YEAR='2025-26';

// UK mortgage-broker rule constants (calibrated 2025-26)
const RULES={
  procFeeTypicalPct:0.0035,         // ~0.35% of loan · typical lender procuration fee
  procFeeBTLTypicalPct:0.005,       // BTL typically higher (~0.5%)
  clawbackWindowMonthsTypical:24,   // most lenders 24m, some 36m
  clawbackWindowMonthsMin:12,
  clawbackWindowMonthsMax:36,
  piMinCoverSingleBroker:1300000,   // €1.3m equiv · MCD/IDD-aligned single claim
  piMinCoverAggregateBroker:1924000,// €1.924m equiv aggregate
  piSyscMinBroker:1500000,          // SYSC practical floor £1.5m
  fcaFeeMinimum:1500,               // small-firm minimum periodic fee
  fcaFeeBlockA18:0,                 // A.18 (home finance) fee block
  networkLevyTypicalPct:0.20,       // 15-30% retained by network for AR firms
  invoiceTermsDays:14,
  cpdHoursPerYear:15,               // FCA 15 hrs/yr for mortgage advisers
  cancelCoolingOffDays:14,          // standard cooling-off period for protection
  vatStandard:0.20,
  vatRegThreshold:90000,
  staleReceivableDays:90,           // write-off candidate threshold
  fosTimeBarYears:6,                // FOS reach via FCA SYSC
  recordRetentionYears:7,           // practical default · 6 SYSC + 3 post-completion FOS
  fcaFeeQuarterMonth:7,
};

const TABS=[
  {id:'dashboard',label:'◊ dashboard'},
  {id:'pipeline',label:'pipeline'},
  {id:'procuration',label:'procuration'},
  {id:'broker-fees',label:'broker fees'},
  {id:'protection',label:'protection'},
  {id:'clawback',label:'clawback'},
  {id:'schedules',label:'schedules'},
  {id:'clients',label:'clients'},
  {id:'advisers',label:'advisers'},
  {id:'firm-pl',label:'firm P&L'},
  {id:'expenses',label:'expenses'},
  {id:'compliance',label:'compliance'},
  {id:'qa',label:'Q&A'},
];

let state={
  active:'dashboard',
  selectedClientId:null,
  selectedAdviserId:null,
  selectedCaseId:null,
  firm:null,
  clients:[],
  advisers:[],
  cases:[],
  procurationFees:[],
  brokerFees:[],
  protectionCommissions:[],
  clawbackEvents:[],
  feeSchedules:[],
  expenses:[],
  chat:[],
  audit:[],
  settings:{
    anthropicKey:'',geminiKey:'',openaiKey:'',openrouterKey:'',
    auditChain:true,
    piAnnualPremium:0,
    fcaAnnualEstimate:1500,
    networkLevyPct:0,
    networkName:'',
    arOrDa:'DA',
    bankDetails:'',
    demoLoaded:false,
  },
};

// ─── util ───
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>Array.from(p.querySelectorAll(s));
const uid=p=>(p||'')+Math.random().toString(36).slice(2,11);
const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>(+n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const money=n=>'£'+fmt(n);
const moneyP=n=>'£'+(+n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>((+n||0)*100).toFixed(1)+'%';
const isoDate=ts=>new Date(ts||Date.now()).toISOString().slice(0,10);
const monthKey=ts=>new Date(ts||Date.now()).toISOString().slice(0,7);
const dayMs=86400000;
const daysBetween=(a,b)=>Math.floor((b-a)/dayMs);
const monthsBetween=(a,b)=>{const d1=new Date(a),d2=new Date(b);return (d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth())}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(String(s));const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

// ─── IDB ───
let db;
const STORES=['state','clients','advisers','firms','cases','procurationFees','brokerFees','protectionCommissions','clawbackEvents','feeSchedules','expenses','audit'];
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(STORE,1);
  r.onupgradeneeded=e=>{const d=e.target.result;for(const s of STORES){if(!d.objectStoreNames.contains(s)){d.createObjectStore(s,{keyPath:'id'})}}};
  r.onsuccess=e=>{db=e.target.result;res(db)};
  r.onerror=()=>rej(r.error);
});}
function txStore(name,mode='readonly'){const tx=db.transaction(name,mode);return tx.objectStore(name)}
function idbPut(store,val){return new Promise(r=>{const req=txStore(store,'readwrite').put(val);req.onsuccess=()=>r(true);req.onerror=()=>r(false)})}
function idbDel(store,key){return new Promise(r=>{const req=txStore(store,'readwrite').delete(key);req.onsuccess=()=>r(true)})}
function idbGetAll(store){return new Promise(r=>{const req=txStore(store).getAll();req.onsuccess=()=>r(req.result||[]);req.onerror=()=>r([])})}
function idbGet(store,key){return new Promise(r=>{const req=txStore(store).get(key);req.onsuccess=()=>r(req.result);req.onerror=()=>r(null)})}

async function appendAudit(action,reasoning,payload){
  if(!state.settings.auditChain)return;
  const prev=state.audit.length?state.audit[state.audit.length-1]:null;
  const prevHash=prev?prev.hash:'';
  const docStr=JSON.stringify(payload||{});
  const docHash=await sha256(docStr);
  const i=(prev?prev.i:0)+1;
  const ts=Date.now();
  const hash=await sha256(prevHash+docHash+ts+i);
  const entry={id:'au_'+i+'_'+ts,i,ts,tool:TOOLNAME,configVersion:TOOLNAME+'@'+VERSION,adviserId:'',clientId:payload?.clientId||'',action,reasoning:reasoning||'',prevHash,docHash,hash,payload:payload||{}};
  state.audit.push(entry);
  if(state.audit.length>5000)state.audit=state.audit.slice(-5000);
  await idbPut('audit',entry);
}

async function saveState(){
  await idbPut('state',{id:'singleton',active:state.active,selectedClientId:state.selectedClientId,selectedAdviserId:state.selectedAdviserId,selectedCaseId:state.selectedCaseId,settings:state.settings,chat:state.chat});
}
async function loadAll(){
  await openDB();
  const s=await idbGet('state','singleton');
  if(s){state.active=s.active||state.active;state.selectedClientId=s.selectedClientId||null;state.selectedAdviserId=s.selectedAdviserId||null;state.selectedCaseId=s.selectedCaseId||null;state.settings=Object.assign({},state.settings,s.settings||{});state.chat=s.chat||[]}
  state.clients=await idbGetAll('clients');
  state.advisers=await idbGetAll('advisers');
  const firms=await idbGetAll('firms');state.firm=firms[0]||null;
  state.cases=await idbGetAll('cases');
  state.procurationFees=await idbGetAll('procurationFees');

// ─── BroadcastChannel mesh ───
let bcMortgage,bcSignal;
function initMesh(){
  try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()});bcSignal.addEventListener('message',e=>{const m=e.data;if(m?.type==='ping')bcSignal.postMessage({source:TOOLNAME,type:'pong',prime:PRIME})})}catch(e){}
  try{bcMortgage=new BroadcastChannel('fall-mortgage');bcMortgage.addEventListener('message',handleMesh);bcMortgage.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME,payload:{wants:['clients','advisers','firm','cases']}})}catch(e){}
}
function meshBroadcast(type,payload){if(!bcMortgage)return;try{bcMortgage.postMessage({v:1,type,ts:now(),source:TOOLNAME,payload})}catch(e){}}
async function handleMesh(e){
  const m=e.data;if(!m||m.source===TOOLNAME)return;
  if(m.type==='sync.snapshot'){
    const p=m.payload||{};let dirty=false;
    if(Array.isArray(p.clients))for(const c of p.clients){if(!state.clients.find(x=>x.id===c.id)){state.clients.push(c);await idbPut('clients',c);dirty=true;}}
    if(Array.isArray(p.advisers))for(const a of p.advisers){if(!state.advisers.find(x=>x.id===a.id)){state.advisers.push(a);await idbPut('advisers',a);dirty=true;}}
    if(p.firm&&!state.firm){state.firm=p.firm;await idbPut('firms',p.firm);dirty=true;}
    if(dirty)render();
  }else if(m.type==='sync.request'){
    meshBroadcast('sync.snapshot',{clients:state.clients,advisers:state.advisers,firm:state.firm,cases:state.cases});
  }
}

// ─── Revenue calcs ───
function totalProcFees(paid){return state.procurationFees.filter(p=>paid?p.paid:true).reduce((s,p)=>s+(+p.amount||0),0);}
function totalBrokerFees(paid){return state.brokerFees.filter(b=>paid?b.paid:true).reduce((s,b)=>s+(+b.amount||0),0);}
function totalProtectionComm(paid){return state.protectionCommissions.filter(p=>paid?p.paid:true).reduce((s,p)=>s+(+p.commission||0),0);}
function totalClawbacks(){return state.clawbackEvents.reduce((s,c)=>s+(+c.amount||0),0);}
function totalExpenses(){return state.expenses.reduce((s,e)=>s+(+e.amount||0),0);}
function grossRevenue(){return totalProcFees()+totalBrokerFees()+totalProtectionComm();}
function netRevenue(){return grossRevenue()-totalClawbacks();}
function netProfit(){return netRevenue()-totalExpenses()-(+state.settings.piAnnualPremium||0)-(+state.settings.fcaAnnualEstimate||0);}
function adviserRevenue(advId){return state.procurationFees.filter(p=>p.adviserId===advId).reduce((s,p)=>s+(+p.amount||0),0)+state.brokerFees.filter(b=>b.adviserId===advId).reduce((s,b)=>s+(+b.amount||0),0)+state.protectionCommissions.filter(p=>p.adviserId===advId).reduce((s,p)=>s+(+p.commission||0),0);}

// ─── Q&A ───
const T0_QA=[
  {q:/proc|procuration/i,a:'Procuration fees are paid by the lender to the broker on completion. Typically 0.35-0.40% of loan amount for residential, 0.50%+ for BTL. Must be disclosed to the client under MCOB 4.4A. Some lenders pay on offer, most on completion. Network ARs typically surrender 15-30% to the network.'},
  {q:/clawback/i,a:'If the client redeems within the clawback window (typically 24 months, some lenders 36), the lender claws back the procuration fee — usually 100% in months 1-12, tapering to 50% in months 13-24. Some lenders use a flat 100% for the full window. Track clawback expiry dates and accrue a provision.'},
  {q:/broker fee|client fee/i,a:'Broker fees must be disclosed in the IDD and Fee Agreement (MCOB 4.4A.4R). Common structures: fixed fee (£500-£1,500), % of loan (typically 0.3-0.5%), or hybrid. Fee trigger is usually at application or offer. If charged on application, refund policy must be disclosed. Some firms charge on DIP for non-refundable admin fee.'},
  {q:/pi|professional indemnity|insurance/i,a:'FCA requires mortgage brokers to hold PI cover meeting MCD minimums: €1.3M single claim, €1.924M aggregate (SYSC practical floor ~£1.5M). Ensure run-off cover is included. Some networks arrange group PI. Premiums depend on case volume, complaint history, and product types (BTL/commercial attract higher premiums).'},
  {q:/fca fee|periodic fee|levy/i,a:'FCA periodic fees are billed quarterly via fee block A.18 (Home Finance). Minimum ~£1,500 for small firms. Larger firms pay based on income. FSCS levy is separate. AR firms pay via network (which may mark up). DA firms pay directly.'},
  {q:/network|ar |appointed/i,a:'Appointed Representatives (ARs) operate under a network\'s FCA permissions. The network takes 15-30% of procuration fees (the "levy"). Benefits: compliance support, PI arranged, FCA fees included, sourcing access. Downside: reduced income, less control. Directly Authorised (DA) firms pay own fees but keep 100%.'},
  {q:/protection|life|ci|critical/i,a:'Protection commissions (life, CI, IP, buildings) are typically indemnity-based: full commission paid upfront, clawable if the policy cancels within 4 years (or term-based: smaller monthly payments). Initial commission rates vary by provider: 100-180% for life/CI, 40-80% for income protection. Report separately from mortgage procuration.'},
  {q:/vat/i,a:'Mortgage broking fees are exempt from VAT (VATA 1994 Schedule 9 Group 5 Item 5 — arranging finance). However, if you provide non-exempt services (e.g., conveyancing referrals, lettings management), you may need to register for VAT once total taxable turnover exceeds £90,000 (2025-26 threshold).'},
  {q:/complaint|fos|dispute/i,a:'FCA DISP requires complaint acknowledgement within 3 business days and final response within 8 weeks. Client can escalate to FOS after 8 weeks or on receipt of final response. FOS time bar: 6 years from event or 3 years from awareness. Current FOS limit: £430,000 (from 1 April 2024). Maintain a complaints register per SYSC.'},
  {q:/record|retention/i,a:'SYSC requires 7 years retention for most mortgage records (from completion date or end of relationship). Suitability reports, fact-finds, IDD, fee agreements, ESIS, correspondence, complaint files. Some firms retain longer for FOS protection. Export regularly from FallMortgagePractice for offline backup.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK mortgage broker rules'};}return null;}
async function askT3(q){
  const keys=[{k:state.settings.anthropicKey,name:'Anthropic',url:'https://api.anthropic.com/v1/messages',bodyFn:()=>JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK mortgage broker practice management expert. Answer concisely.\n\n'+q}]}),headers:{'x-api-key':'KEY','anthropic-version':'2023-06-01','content-type':'application/json'},parse:r=>r.content?.[0]?.text}];
  for(const p of keys){if(!p.k)continue;try{const hdrs={};for(const[hk,hv]of Object.entries(p.headers))hdrs[hk]=hv.replace('KEY',p.k);const res=await fetch(p.url,{method:'POST',headers:hdrs,body:p.bodyFn()});if(!res.ok)continue;const json=await res.json();const text=p.parse(json);if(text)return {answer:text,source:'T3 · '+p.name};}catch(e){}}return null;
}

function renderQA(v){
  v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 offline rules · T3 BYOK</div></div>
    <p style="font-size:12px;color:var(--cream-dim);margin-bottom:14px">Ask about procuration, clawback, broker fees, PI cover, FCA fees, networks, protection commissions, VAT, complaints, record retention.</p>
    <div class="card" style="max-width:780px">
      <div class="chat" id="chatBox">${(state.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div>
      <div class="chat-input"><input id="chatIn" placeholder="Ask…" onkeydown="if(event.key==='Enter')askQuestion()"><button class="btn primary" onclick="askQuestion()">Ask</button></div>
    </div>`;
  const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight;
}
async function askQuestion(){
  const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';
  state.chat.push({role:'user',text:q});render();
  let r=askT0(q);if(!r)r=await askT3(q);
  state.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match and no BYOK key configured. Add a key in Settings for T3 answers.',source:'system'});
  saveState();render();
}

  if(c.stage==='completed'){c.completionDate=now();c.clawbackExpiry=now()+c.clawbackMonths*30*dayMs;}
  if(!c.clientName){toast('Client name required');return;}
  await saveCase(c,'case.created');closeModal();toast('Case added');render();
}
async function submitEditCase(){
  const id=$('#ecId').value;const c=state.cases.find(x=>x.id===id);if(!c)return;
  c.clientName=$('#ecClient').value.trim();c.lender=$('#ecLender').value.trim();
  c.loanAmount=parseFloat($('#ecLoan').value)||0;c.propertyValue=parseFloat($('#ecVal').value)||0;
  c.product=$('#ecProduct').value.trim();const newStage=$('#ecStage').value;
  if(newStage!==c.stage){c.stageDate=now();if(newStage==='completed'&&c.stage!=='completed'){c.completionDate=now();c.clawbackExpiry=now()+(parseInt($('#ecClaw').value)||24)*30*dayMs;}}
  c.stage=newStage;c.procFee=parseFloat($('#ecProc').value)||0;c.brokerFee=parseFloat($('#ecBroker').value)||0;
  c.adviserId=$('#ecAdv').value;c.clawbackMonths=parseInt($('#ecClaw').value)||24;
  await saveCase(c,'case.updated');closeModal();toast('Case saved');render();
}

// ─── Export / Import / Wipe ───
function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,clients:state.clients,advisers:state.advisers,cases:state.cases,procurationFees:state.procurationFees,brokerFees:state.brokerFees,protectionCommissions:state.protectionCommissions,clawbackEvents:state.clawbackEvents,feeSchedules:state.feeSchedules,expenses:state.expenses,settings:state.settings};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallmortgagepractice-export.json';a.click();URL.revokeObjectURL(u);toast('Exported');}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());for(const k of['clients','advisers','cases','procurationFees','brokerFees','protectionCommissions','clawbackEvents','feeSchedules','expenses']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r);}}if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm);}if(d.settings)state.settings=Object.assign(state.settings,d.settings);saveState();toast('Imported');render();}catch(e){toast('Import failed');}};inp.click();}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;if(!confirm('Are you sure?'))return;for(const s of STORES){const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r;});}location.reload();}

  const prot={id:uid('pc'),ts:now(),updatedAt:now(),clientName:'James Patterson',provider:'Aviva',product:'Level term life 25yr',premium:42,commission:756,paid:true,isDemo:true};
